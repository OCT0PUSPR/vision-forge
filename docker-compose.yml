services:
  vision-forge:
    build: .
    image: oct0puspr/vision-forge:latest
    container_name: vision-forge
    ports:
      - "8000:8000"
    environment:
      # Secrets come from the host env / a .env file (never baked into the image).
      - HF_TOKEN=${HF_TOKEN:-}
      - VF_DEVICE=${VF_DEVICE:-cpu}
      - VF_CONF_THRESHOLD=${VF_CONF_THRESHOLD:-0.25}
      - VF_IOU_THRESHOLD=${VF_IOU_THRESHOLD:-0.45}
    env_file:
      - .env
    volumes:
      # Persist auto-downloaded model weights across restarts.
      - vf-weights:/root/.cache
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  vf-weights:
