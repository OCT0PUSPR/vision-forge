name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint & Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lightweight dependencies
        run: |
          python -m pip install --upgrade pip
          # Heavy ML deps (torch/ultralytics/transformers) are intentionally
          # NOT installed; all heavy imports are guarded so the unit tests and
          # lint run on the minimal set.
          pip install -r requirements-min.txt

      - name: Byte-compile all sources
        run: |
          python -m compileall visionforge tests examples

      - name: Lint (ruff)
        run: |
          ruff check visionforge tests examples

      - name: Run unit tests
        run: |
          pytest -q

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push)
        run: docker build -t vision-forge:ci .
